spring.application.name=hermecard-auth-api

# Segredo JWT — em produção, mova para variável de ambiente: ${JWT_SECRET}
jwt.secret=jW5vunRAcuQc569wdaft0tTsdhSQcvZ89KNbJ5bnFVc=

# Banco de dados — em produção, use variáveis de ambiente
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/hermecarddb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:NeverEndingWar64}

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.ddl-auto=update

spring.sql.init.mode=always

# Thymeleaf — cache desabilitado em desenvolvimento para facilitar live reload
spring.thymeleaf.cache=false